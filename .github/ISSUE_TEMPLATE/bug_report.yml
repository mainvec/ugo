name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem.
  - type: input
    id: version
    attributes:
      label: ugo version
      description: The release tag or commit where the problem occurs.
      placeholder: v0.5.1
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: go1.22.1 darwin/arm64
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Package
      placeholder: github.com/mainvec/ugo/registry
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain the actual and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the smallest program or test that demonstrates the problem.
      render: go
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context