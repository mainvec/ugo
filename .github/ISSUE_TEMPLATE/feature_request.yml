name: Feature request
description: Propose an improvement to an existing package
title: "feat: "
labels:
  - enhancement
body:
  - type: input
    id: package
    attributes:
      label: Package
      description: Which package would own this feature?
      placeholder: github.com/mainvec/ugo/validate
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case or limitation should this feature address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: Show how callers would use the feature when possible.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered